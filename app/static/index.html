<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mammas bilder</title>
<link rel="stylesheet" href="/vendor/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="/vendor/material-symbols/material-symbols.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="gallery" class="screen">
  <div id="stickyHeader">
    <div id="toolbar">
      <button id="selectModeBtn">Markera bilder</button>
      <button id="gridSizeBtn">Stora bilder</button>
      <button id="downloadAllBtn">Ladda ner allt media</button>
      <button id="voiceoverRecordBtn">&#127908; Spela in berättelse</button>
      <button id="voiceoverListBtn">Berättelser</button>
      <button id="helpBtn">&#10067; Hjälp</button>
      <button id="downloadFolderLabel" class="folder-label"></button>
    </div>
    <div id="albumNavBar">
      <nav id="albumNav"></nav>
      <button id="albumNavToggle">Visa alla album &#9662;</button>
    </div>
  </div>
  <div id="tree"></div>
</div>

<button id="downloadSelectedBtn" class="floating-btn hidden">Ladda ner markerade (0)</button>
<button id="cancelDownloadBtn" class="floating-btn cancel-btn hidden">&#10005; Avbryt nedladdning</button>

<div id="lightbox" class="hidden">
  <button id="lbClose" class="lb-btn lb-close">&#10005;</button>
  <button id="lbPrev" class="lb-btn lb-prev">&#10094;</button>
  <img id="lbImg" src="">
  <button id="lbNext" class="lb-btn lb-next">&#10095;</button>
  <button id="lbDownload" class="lb-btn lb-download">Ladda ner</button>
</div>

<div id="recordingBanner" class="hidden">
  &#128308; Spelar in berättelse - bläddra och peka fritt på bilderna medan du pratar
  <button id="voiceoverStopBtn">Stoppa inspelning</button>
</div>

<div id="voiceoverListModal" class="hidden">
  <button id="voiceoverListClose" class="lb-btn lb-close">&#10005;</button>
  <h2>Berättelser</h2>
  <div id="voiceoverListItems"></div>
</div>

<div id="voiceoverPlayer" class="hidden">
  <button id="voiceoverPlayerClose" class="lb-btn lb-close">&#10005;</button>
  <div id="voiceoverPlayerImageWrap">
    <img id="voiceoverPlayerImg" src="">
    <div id="voiceoverPointerDot" class="hidden"></div>
  </div>
  <audio id="voiceoverPlayerAudio" controls></audio>
</div>

<div id="infoModal" class="hidden">
  <div id="infoModalBox">
    <h2 id="infoModalTitle"></h2>
    <p id="infoModalBody"></p>
    <label id="infoModalDontShowWrap"><input type="checkbox" id="infoModalDontShowAgain"> Visa inte detta igen</label>
    <button id="infoModalClose" class="big-btn">Fortsätt</button>
  </div>
</div>

<div id="helpModal" class="hidden">
  <div id="helpModalBox">
    <button id="helpModalClose" class="lb-btn lb-close">&#10005;</button>
    <h2>Hjälp och information</h2>
    <p>Meddelanden du tidigare stängt kan öppnas igen här.</p>
    <div id="helpModalItems"></div>
  </div>
</div>

<script src="/vendor/jquery/jquery.slim.min.js"></script>
<script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
