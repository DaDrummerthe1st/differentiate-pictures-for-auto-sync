services:
  app:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: photo_server
      POSTGRES_USER: photo_server
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in server/.env, never hardcode it}
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in server/.env, never hardcode it}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in server/.env, never hardcode it}
    depends_on:
      - postgres
      - redis
    mem_limit: 256m
    restart: "no"

  redis:
    image: redis:8.8-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in server/.env, never hardcode it}"]
    mem_limit: 128m
    restart: "no"

  postgres:
    image: postgres:18.4-bookworm
    command: postgres -c max_connections=20 -c shared_buffers=128MB
    environment:
      POSTGRES_DB: photo_server
      POSTGRES_USER: photo_server
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in server/.env, never hardcode it}
    volumes:
      - postgres_data:/var/lib/postgresql
    mem_limit: 512m
    restart: "no"

volumes:
  postgres_data:
